<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido | Granja Cerdito Feliz</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="welcome">

<div class="welcome-container">
  <img src="Logo Granja Cerdito Feliz fondo blanco.png" class="logo">
  <h1>Granja Cerdito Feliz 🐷</h1>
  <p class="mensaje">
    Somos una granja comprometida con ofrecer carne fresca, de calidad y directa al consumidor.
    Nuestro objetivo es brindarte confianza, frescura y el mejor producto para tu familia.
  </p>

  <h3>Selecciona tu ubicación</h3>

  <button onclick="seleccionarRegion('ciudad')" class="btn-primary">Ciudad</button>
  <button onclick="seleccionarRegion('interior')" class="btn-primary">Interior</button>
</div>

<script>
function seleccionarRegion(region) {
  localStorage.setItem('region', region);
  window.location.href = 'tienda.html';
}
</script>

</body>
</html>
