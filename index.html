<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Granja Cerdito Feliz</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <img src="/Logo Granja Cerdito Feliz fondo blanco.png" alt="Logo" class="logo">
  <h1>Granja Cerdito Feliz 🐷</h1>
  <p class="tagline">Carne fresca • Directo de granja • Cupos limitados</p>
</header>

<section class="controls">
  <label>Selecciona tu ubicación:</label>
  <select id="region">
    <option value="2.5">Ciudad ($2.50/lb)</option>
    <option value="2.25">Interior ($2.25/lb)</option>
  </select>
</section>

<section class="alert">
  ⚠️ Venta por pedidos – Se agota rápido
</section>

<div class="grid" id="productos"></div>

<h2 class="section-title">🔥 Combos Especiales</h2>
<div class="grid" id="combos"></div>

<div class="cart">
  <h2>🛒 Tu Pedido</h2>
  <div id="lista"></div>
  <h3>Total: $<span id="total">0</span></h3>

  <input id="nombre" placeholder="Nombre">
  <input id="correo" placeholder="Correo">

  <button class="btn-primary" onclick="enviarPedido()">Enviar Pedido por WhatsApp</button>
</div>

<script src="script.js"></script>
</body>
</html>
